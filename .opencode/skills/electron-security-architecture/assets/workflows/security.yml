name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * 1' # semanal

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: github/codeql-action/init@ # pin por SHA na configuração real
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@ # pin por SHA na configuração real

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - run: npm audit --omit=dev --audit-level=high

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/dependency-review-action@ # pin por SHA na configuração real

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - run: semgrep ci --config auto --config .semgrep/electron-security.yml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ # pin por SHA na configuração real

  eslint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.2
        with:
          node-version: 20
      - run: npm ci
      - run: npx eslint . --plugin security --plugin no-unsanitized
