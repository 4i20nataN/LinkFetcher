# Release Workflow — LinkFetcher
#
# Builds Windows portable + NSIS installer, signs the manifest with Ed25519,
# and publishes a GitHub Release with all artifacts.
#
# Trigger: push a tag like v1.0.0-beta.1
#
# Required GitHub repo secret:
#   UPDATE_SIGNING_PRIVATE_KEY — Ed25519 private key PEM for manifest signing

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in package.json
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.VERSION }}"
          if [ "$CURRENT" != "$TARGET" ]; then
            npm version "$TARGET" --no-git-tag-version
          else
            echo "Version already set to $TARGET, skipping"
          fi

      - name: Build app
        run: npm run build

      - name: Build Windows installers
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums + manifest + signature
        shell: node
        run: |
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          const VERSION = '${{ steps.version.outputs.VERSION }}';
          const releaseDir = 'release';

          // Find exe files
          const files = fs.readdirSync(releaseDir).filter(f => f.endsWith('.exe'));
          console.log('Found executables:', files);

          const setupFile = files.find(f => f.includes('Setup'));
          const portableFile = files.find(f => f.includes('Portable'));

          function hashFile(filePath, algo) {
            const data = fs.readFileSync(filePath);
            return crypto.createHash(algo).update(data).digest('hex');
          }

          function fileSize(filePath) {
            return fs.statSync(filePath).size;
          }

          // Build artifacts array
          const artifacts = [];
          if (setupFile) {
            const p = path.join(releaseDir, setupFile);
            artifacts.push({
              platform: 'win32-x64',
              fileName: setupFile,
              sha256: hashFile(p, 'sha256'),
              sha512: hashFile(p, 'sha512'),
              sizeBytes: fileSize(p),
            });
          }
          if (portableFile) {
            const p = path.join(releaseDir, portableFile);
            artifacts.push({
              platform: 'win32-x64-portable',
              fileName: portableFile,
              sha256: hashFile(p, 'sha256'),
              sha512: hashFile(p, 'sha512'),
              sizeBytes: fileSize(p),
            });
          }

          // Write manifest.json
          const manifest = {
            schemaVersion: 1,
            repository: '4i20nataN/LinkFetcher',
            version: VERSION,
            minimumSupportedVersion: '1.0.0',
            publishedAt: new Date().toISOString(),
            signingKeyId: 'v1',
            artifacts,
          };
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
          console.log('manifest.json written');

          // Write CHECKSUMS
          let checksums = '';
          for (const art of artifacts) {
            const p = path.join(releaseDir, art.fileName);
            checksums += `${art.sha512}  ${art.fileName}\n`;
          }
          fs.writeFileSync('CHECKSUMS_SHA512.txt', checksums);
          console.log('CHECKSUMS_SHA512.txt written');

          // Sign manifest with Ed25519
          const privKeyPem = process.env.UPDATE_SIGNING_PRIVATE_KEY;
          if (!privKeyPem) {
            console.error('UPDATE_SIGNING_PRIVATE_KEY not set');
            process.exit(1);
          }
          const manifestBytes = fs.readFileSync('manifest.json');
          const signature = crypto.sign(null, manifestBytes, privKeyPem);
          fs.writeFileSync('manifest.json.sig', signature);
          console.log('manifest.json.sig written');

          // Summary
          console.log(`\nRelease ${VERSION}:`);
          for (const art of artifacts) {
            console.log(`  ${art.fileName}: ${art.sizeBytes} bytes, sha256=${art.sha256.slice(0, 16)}...`);
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LinkFetcher ${{ steps.version.outputs.VERSION }}"
          body: |
            ## LinkFetcher ${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **Installer**: Run the `.exe` installer for automatic setup
            - **Portable**: Extract and run `LinkFetcher.exe` directly

            ### Security
            - Manifest signed with Ed25519
            - SHA-512 checksums included
          files: |
            release/*.exe
            manifest.json
            manifest.json.sig
            CHECKSUMS_SHA512.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
