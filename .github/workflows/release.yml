# Release Workflow — LinkFetcher
#
# Builds Windows portable + NSIS installer, signs the manifest with Ed25519,
# and publishes a GitHub Release with all artifacts.
#
# Trigger: push a tag like v1.0.0-beta.1
#
# Required GitHub repo secret:
#   UPDATE_SIGNING_PRIVATE_KEY — Ed25519 private key PEM for manifest signing

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in package.json
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.VERSION }}"
          if [ "$CURRENT" != "$TARGET" ]; then
            npm version "$TARGET" --no-git-tag-version
          else
            echo "Version already set to $TARGET, skipping"
          fi

      - name: Build app
        run: npm run build

      - name: Build Windows installers
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write signing key to file
        shell: bash
        run: echo "$UPDATE_SIGNING_PRIVATE_KEY" > "$RUNNER_TEMP/signing_key.pem"
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}

      - name: Generate checksums + manifest + signature
        run: node scripts/generate-manifest.mjs
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
          SIGNING_KEY_PATH: ${{ runner.temp }}/signing_key.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LinkFetcher ${{ steps.version.outputs.VERSION }}"
          body: |
            ## LinkFetcher ${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **Installer**: Run the `.exe` installer for automatic setup
            - **Portable**: Extract and run `LinkFetcher.exe` directly

            ### Security
            - Manifest signed with Ed25519
            - SHA-512 checksums included
          files: |
            release/*.exe
            manifest.json
            manifest.json.sig
            CHECKSUMS_SHA512.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
