# Release Workflow — LinkFetcher
#
# Builds Windows portable + NSIS installer, signs the manifest with Ed25519,
# and publishes a GitHub Release with all artifacts.
#
# Trigger: push a tag like v1.0.0-beta.1
#
# Required GitHub repo secret:
#   UPDATE_SIGNING_PRIVATE_KEY — Ed25519 private key PEM for manifest signing

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in package.json
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.VERSION }}"
          if [ "$CURRENT" != "$TARGET" ]; then
            npm version "$TARGET" --no-git-tag-version
          else
            echo "Version already set to $TARGET, skipping"
          fi

      - name: Build app
        run: npm run build

      - name: Build Windows installers
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums + manifest + signature
        run: node scripts/generate-manifest.mjs
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}

      - name: Create GitHub Release + Upload assets
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.VERSION }}"
          PRERELEASE="${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}"

          # Build file list — only include files that exist
          FILES=""
          for f in release/*.exe manifest.json manifest.json.sig CHECKSUMS_SHA512.txt; do
            if [ -f "$f" ]; then
              echo "Found: $f ($(du -h "$f" | cut -f1))"
              FILES="$FILES $f"
            else
              echo "Skip: $f (not found)"
            fi
          done

          if [ -z "$FILES" ]; then
            echo "::error::No release artifacts found!"
            exit 1
          fi

          # Write notes to temp file
          NOTES_FILE=$(mktemp)
          echo "## LinkFetcher ${TAG}" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          echo "### Downloads" >> "$NOTES_FILE"
          echo "- **Installer**: Run the \`.exe\` installer for automatic setup" >> "$NOTES_FILE"
          echo "- **Portable**: Extract and run \`LinkFetcher.exe\` directly" >> "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          echo "### Security" >> "$NOTES_FILE"
          echo "- Manifest signed with Ed25519" >> "$NOTES_FILE"
          echo "- SHA-512 checksums included" >> "$NOTES_FILE"

          # Delete existing release if present (re-trigger safe)
          gh release delete "v${TAG}" --yes 2>/dev/null || true

          # Create release with all assets in one command
          echo "Creating release v${TAG} with assets..."
          if [ "$PRERELEASE" = "true" ]; then
            gh release create "v${TAG}" --title "LinkFetcher ${TAG}" --notes-file "$NOTES_FILE" --prerelease $FILES
          else
            gh release create "v${TAG}" --title "LinkFetcher ${TAG}" --notes-file "$NOTES_FILE" $FILES
          fi

          rm -f "$NOTES_FILE"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/v${TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
